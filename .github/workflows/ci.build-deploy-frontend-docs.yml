name: Generate and deploy TypeDoc for frontend

on:
    push:
        branches: [main]
        paths:
            - "lib/**/*.ts"
            - "lib/**/*.tsx"
            - "applications/**/*.ts"
            - "applications/**/*.tsx"
            - "typedoc.json"
            - "tsconfig.json"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    generate-docs:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20.19.4"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Generate TypeDoc
              run: npm run docs

            - uses: actions/configure-pages@v4

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: ./docs

            - uses: actions/deploy-pages@v4
              id: deployment
