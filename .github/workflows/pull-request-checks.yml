name: PR Checks

on:
  push:
    branches: [feature/ci-setup] # TODO: remove after verifying workflow
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Build lib
        run: npm run lib:build
      - name: Run tests
        run: npm run test -w=lib
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-coverage
          path: lib/coverage
          retention-days: 14
