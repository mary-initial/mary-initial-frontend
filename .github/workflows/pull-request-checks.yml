name: PR - Unit tests

on:
  push:
    branches:
      - feature/ci-setup
  pull_request:
    branches: ["main"]

jobs:
  tests:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.52.0-noble

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Install Dependencies
        run: npm ci
      - name: Build and test UI-library
        run: |
          npm run lib:build
          npm run test --workspace=lib
      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: lib/coverage
