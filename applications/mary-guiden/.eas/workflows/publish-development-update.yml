name: Publish development update

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize
    paths:
      - applications/mary-guiden/**
      - lib/**

jobs:
  publish_dev_update:
    if: ${{ contains(github.label, 'mary-guiden-app:test') }}
    name: Publish development update
    type: update
    environment: development
    params:
      branch: ${{ github.ref_name || 'test' }}
  github_comment:
    type: github-comment
